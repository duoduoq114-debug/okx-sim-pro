<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OKX Staff Sim</title><link rel="stylesheet" href="/style.css"></head><body><header><div class="brand">OKX Staff Sim</div><nav><button onclick="show('trade')">交易</button><button onclick="show('assets')">资产</button><button onclick="show('orders')">订单</button><button onclick="show('admin')">后台</button></nav><div id="userbar"></div></header><main><section id="auth" class="panel auth"><h2>内部员工模拟盘</h2><p>仅用于内部培训/演示，不支持真实充值、提现或真实交易。</p><input id="username" placeholder="账号"><input id="password" type="password" placeholder="密码"><div><button onclick="register()">注册</button><button onclick="login()">登录</button></div></section><section id="trade" class="page hidden"><div class="grid"><div class="panel"><h3>行情</h3><div id="markets"></div></div><div class="panel big"><div class="pair"><h2 id="pair">BTC/USDT</h2><b id="price">--</b><span id="change"></span></div><canvas id="chart" height="280"></canvas></div><div class="panel"><h3>买入/卖出</h3><select id="symbol" onchange="selectSymbol(this.value)"></select><input id="amount" type="number" step="0.0001" placeholder="数量"><button class="buy" onclick="order('buy')">买入</button><button class="sell" onclick="order('sell')">卖出</button><button onclick="fund()">领取 100,000 USDT</button><p id="notice"></p></div></div></section><section id="assets" class="page hidden"><div class="panel"><h3>我的资产</h3><table id="balances"></table></div></section><section id="orders" class="page hidden"><div class="panel"><h3>订单/成交记录</h3><table id="ordersTable"></table></div></section><section id="admin" class="page hidden"><div class="panel"><h3>员工账户后台</h3><p>第一个注册账号自动成为管理员。</p><table id="usersTable"></table></div></section></main><script src="/app.js"></script></body></html>
